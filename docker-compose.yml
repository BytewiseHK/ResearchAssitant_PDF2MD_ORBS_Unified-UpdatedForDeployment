version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-assistant-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"

      # MinerU.net (required for /upload PDF extraction)
      # MINERU_API_KEY: "${MINERU_API_KEY}"

      # Application settings
      HOST: "0.0.0.0"
      PORT: "8000"
      SESSION_TTL_SECONDS: "7200"

      # Model configuration (free model by default)
      OPENROUTER_MODEL: "openrouter/free"
      OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"

      # CORS for local development
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000,http://127.0.0.1:8000"

      # Optional: Add your OpenRouter API key here (use .env file for production)
      # OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"

    volumes:
      - ./uploads:/app/uploads
      - ./mineru_output:/app/mineru_output
      - ./research.db:/app/research.db
      - ./temp:/app/temp

    # Memory limits to prevent out-of-memory kills
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped
    networks:
      - research-network

  # Optional: Frontend service (uncomment to enable)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: research-assistant-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     REACT_APP_API_URL: "http://localhost:8000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - research-network

networks:
  research-network:
    driver: bridge
