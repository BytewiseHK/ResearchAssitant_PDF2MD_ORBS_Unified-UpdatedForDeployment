# Blueprint: Docker backend (lightweight-cloud — MinerU.net only).
# Add MINERU_API_KEY in the Render dashboard as a secret (not in this file).
services:
  - type: web
    name: research-assistant-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    ports:
      - 8000
    envVars:
      - key: SESSION_TTL_SECONDS
        value: "1800"

      - key: OPENROUTER_MODEL
        value: "openrouter/free"

      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"

      - key: PYTHONOPTIMIZE
        value: "2"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "128000"
